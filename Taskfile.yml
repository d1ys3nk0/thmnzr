---

version: '3'

vars:
  BIN: bin/thmnzr
  IMAGE: thmnzr

tasks:
  default:
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w cmd internal

  fmt-check:
    desc: Check Go formatting
    cmds:
      - test -z "$(gofmt -l cmd internal)"

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  build:
    desc: Build the CLI binary
    cmds:
      - go build -o {{.BIN}} ./cmd/thmnzr

  check:
    desc: Run all checks
    cmds:
      - task: fmt-check
      - task: vet
      - task: test
      - task: build

  docker-build:
    desc: Build the Docker image locally
    cmds:
      - docker build -t {{.IMAGE}} .

  docker-run:
    desc: Show Docker CLI help in the image
    cmds:
      - docker run --rm -i {{.IMAGE}} thmnzr --help

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
